name: Build & Deploy

# Build the trading frontend image, push to Docker Hub, then deploy on the VPS
# by pulling the new tag (via ansible-library). This repo needs
# DOCKERHUB_TOKEN + ANSIBLE_VAULT_PASSWORD.

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package*.json"
      - "vite.config.*"
      - "nginx.conf"
      - "Dockerfile"
      - "deployment-template/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  release:
    uses: mach1el/action-library/.github/workflows/build-push-deploy.yml@master
    with:
      project: apexvoid-trading
      registry-namespace: mich43l
      images: >-
        [
          {"name": "apexvoid-trading-frontend", "context": ".", "dockerfile": "Dockerfile"}
        ]
    secrets:
      registry-token: ${{ secrets.DOCKERHUB_TOKEN }}
      vault-password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
